---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: rancher-gateway
  namespace: cattle-system
  labels:
    io.cilium/gateway: rancher
spec:
  gatewayClassName: cilium
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "rancher.31.22.104.56.sslip.io"
      tls:
        mode: Terminate
        certificateRefs:
          - name: rancher-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
---
# Leaf certificate, issued by Rancher's own auto-created Issuer ("rancher")
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rancher-gateway-tls
  namespace: cattle-system
spec:
  secretName: rancher-gateway-tls
  dnsNames:
    - "rancher.31.22.104.56.sslip.io"
  issuerRef:
    name: rancher
    kind: Issuer
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rancher-route
  namespace: cattle-system
spec:
  parentRefs:
    - name: rancher-gateway
  hostnames:
    - "rancher.31.22.104.56.sslip.io"
  rules:
    - backendRefs:
        - name: rancher
          port: 80
---
# IP pool: claims worker-3's existing node IP
apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: rancher-gateway-pool
spec:
  blocks:
    - cidr: "31.22.104.56/32"
  serviceSelector:
    matchLabels:
      io.cilium.gateway/owning-gateway: rancher-gateway
---
# L2 announcement policy: only worker-3 announces this IP
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: rancher-gateway-l2policy
spec:
  serviceSelector:
    matchLabels:
      io.cilium.gateway/owning-gateway: rancher-gateway
  nodeSelector:
    matchExpressions:
      - key: kubernetes.io/hostname
        operator: In
        values:
          - worker-3
  interfaces:
    - ^eth[0-9]+
  externalIPs: false
  loadBalancerIPs: true
