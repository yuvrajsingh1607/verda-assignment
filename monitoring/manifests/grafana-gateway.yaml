---
# 1. Self-signed bootstrap issuer
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-bootstrap
  namespace: monitoring
spec:
  selfSigned: {}
---
# 2. CA certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: monitoring-ca
  namespace: monitoring
spec:
  isCA: true
  commonName: monitoring-ca
  secretName: monitoring-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: Issuer
---
# 3. Real Issuer backed by the CA above
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: monitoring
  namespace: monitoring
spec:
  ca:
    secretName: monitoring-ca-secret
---
# 4. Leaf certificate for the Grafana hostname
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-gateway-tls
  namespace: monitoring
spec:
  secretName: grafana-gateway-tls
  dnsNames:
    - "grafana.95.133.253.112.sslip.io"
  issuerRef:
    name: monitoring
    kind: Issuer
---
# 5. Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: grafana-gateway
  namespace: monitoring
  labels:
    io.cilium/gateway: grafana
spec:
  gatewayClassName: cilium
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "grafana.95.133.253.112.sslip.io"
      tls:
        mode: Terminate
        certificateRefs:
          - name: grafana-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
---
# 6. HTTPRoute -> kube-prometheus-stack-grafana, port 80
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
    - name: grafana-gateway
  hostnames:
    - "grafana.95.133.253.112.sslip.io"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
---
# 7. IP pool: claims master-3's existing node IP
apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: grafana-gateway-pool
spec:
  blocks:
    - cidr: "95.133.253.112/32"
  serviceSelector:
    matchLabels:
      io.cilium.gateway/owning-gateway: grafana-gateway
---
# 8. L2 announcement policy: only master-3 announces this IP
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: grafana-gateway-l2policy
spec:
  serviceSelector:
    matchLabels:
      io.cilium.gateway/owning-gateway: grafana-gateway
  nodeSelector:
    matchExpressions:
      - key: kubernetes.io/hostname
        operator: In
        values:
          - master-3
  interfaces:
    - ^eth[0-9]+
  externalIPs: false
  loadBalancerIPs: true
