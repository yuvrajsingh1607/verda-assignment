apiVersion: apps/v1
kind: Deployment
metadata:
  name: kwok-demo
  namespace: default
spec:
  replicas: 50
  selector:
    matchLabels:
      app: kwok-demo
  template:
    metadata:
      labels:
        app: kwok-demo
    spec:
      tolerations:
        - key: kwok.x-k8s.io/node
          operator: Equal
          value: fake
          effect: NoSchedule
      nodeSelector:
        type: kwok
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10.1
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
